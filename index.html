<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simonov Birthday | Eternal Loop</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #030008;
    --amethyst: #4d1d95;
    --iris: #7c3aed;
    --silver: #e2e8f0;
    --muted: rgba(226, 232, 240, 0.3);
    --border: rgba(124, 58, 237, 0.2);
  }

  html, body {
    width: 100%; height: 100%;
    overflow-x: hidden;
    background: var(--bg);
    color: var(--silver);
    font-family: 'Cormorant Garamond', serif;
  }

  /* Soft Vignette */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(circle at center, transparent 30%, #000 110%);
    pointer-events: none;
    z-index: 5;
  }

  /* Grainy Texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 6;
    mix-blend-mode: screen;
  }

  /* Floating Nebulae */
  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    pointer-events: none;
    animation: pulseNebula 20s ease-in-out infinite alternate;
  }
  .n-1 { width: 800px; height: 800px; background: var(--amethyst); top: -20%; left: -10%; }
  .n-2 { width: 600px; height: 600px; background: var(--iris); bottom: -10%; right: -5%; animation-delay: -5s; }

  @keyframes pulseNebula {
    from { transform: scale(1) translate(0,0); opacity: 0.1; }
    to { transform: scale(1.1) translate(20px, 20px); opacity: 0.2; }
  }

  #canvas { position: fixed; inset: 0; pointer-events: none; z-index: 2; opacity: 0.4; }

  main {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 40px;
  }

  /* Decorative Line */
  .hr-elegant {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--iris), transparent);
    opacity: 0;
    animation: fadeIn 2s ease forwards 0.5s;
  }

  .label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.6em;
    color: var(--iris);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 1.5s ease forwards 0.3s;
  }

  .name-wrap { text-align: center; }
  
  .name-main {
    font-family: 'Cinzel', serif;
    font-size: clamp(50px, 12vw, 110px);
    font-weight: 400;
    letter-spacing: 0.15em;
    background: linear-gradient(to bottom, #fff, #a78bfa, #4c1d95);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }

  .name-sub {
    font-size: 16px;
    font-style: italic;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: lowercase;
    opacity: 0;
    animation: fadeIn 2s ease forwards 0.8s;
  }

  #phase-countdown { opacity: 0; animation: fadeIn 1.5s ease forwards 1s; }
  
  .countdown-grid { display: flex; gap: 30px; }
  
  .cd-item { text-align: center; min-width: 60px; }
  
  .cd-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 300;
    display: block;
  }
  
  .cd-lbl {
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Birthday Mode Styles */
  #phase-birthday { display: none; text-align: center; }
  
  .bday-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(30px, 8vw, 64px);
    letter-spacing: 0.2em;
    margin-bottom: 20px;
  }
  
  .bday-quote {
    font-size: 18px;
    font-style: italic;
    max-width: 500px;
    line-height: 1.8;
    color: var(--muted);
  }

  .date-badge {
    margin-top: 20px;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--iris);
    border: 1px solid var(--border);
    padding: 8px 24px;
    opacity: 0;
    animation: fadeIn 2s ease forwards 1.2s;
  }

  footer {
    position: fixed;
    bottom: 30px;
    font-size: 9px;
    letter-spacing: 0.5em;
    color: rgba(255,255,255,0.1);
    text-transform: uppercase;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 3; display: none; }
</style>
</head>
<body>

<div class="nebula n-1"></div>
<div class="nebula n-2"></div>
<canvas id="canvas"></canvas>
<canvas id="confetti"></canvas>

<main>
  <div class="label">The Celestial Cycle</div>
  <div class="hr-elegant"></div>

  <div class="name-wrap">
    <div class="name-main">Kayoko</div>
    <div class="name-sub">simonov41coder</div>
  </div>

  <div id="phase-countdown">
    <div class="countdown-grid">
      <div class="cd-item"><span class="cd-num" id="cd-d">00</span><span class="cd-lbl">Days</span></div>
      <div class="cd-item"><span class="cd-num" id="cd-h">00</span><span class="cd-lbl">Hrs</span></div>
      <div class="cd-item"><span class="cd-num" id="cd-m">00</span><span class="cd-lbl">Min</span></div>
      <div class="cd-item"><span class="cd-num" id="cd-s">00</span><span class="cd-lbl">Sec</span></div>
    </div>
  </div>

  <div id="phase-birthday">
    <div class="bday-title">Hallowed Birth</div>
    <div class="bday-quote">"The stars align once more. Another year etched into the code of the universe."</div>
  </div>

  <div class="date-badge">APRIL 15</div>
</main>

<footer>Eternal Loop Active</footer>

<script>
// ── Floating Stardust ──
const cv = document.getElementById('canvas');
const ctx = cv.getContext('2d');
let stars = [];
function resize() { cv.width = innerWidth; cv.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

for(let i=0; i<120; i++) stars.push({
  x: Math.random()*innerWidth, y: Math.random()*innerHeight,
  r: Math.random()*1.1, a: Math.random(), 
  v: Math.random()*0.15 + 0.05
});

function draw() {
  ctx.clearRect(0,0,cv.width,cv.height);
  stars.forEach(s => {
    s.y -= s.v;
    if(s.y < 0) s.y = cv.height;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(167, 139, 250, ${s.a})`;
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

// ── Looping Logic + Threshold ──
const BIRTH_MONTH = 3; // April
const BIRTH_DAY = 15;
const THRESHOLD = 2; // Days to stay in birthday mode

function getDates() {
    const now = new Date();
    let year = now.getFullYear();
    
    // Target is April 15, 00:00 WIB (which is April 14, 17:00 UTC)
    let target = new Date(Date.UTC(year, BIRTH_MONTH, BIRTH_DAY - 1, 17, 0, 0));
    let thresholdEnd = new Date(target.getTime() + (THRESHOLD * 24 * 60 * 60 * 1000));

    // If it's more than 2 days after the birthday, target next year
    if (now > thresholdEnd) {
        target = new Date(Date.UTC(year + 1, BIRTH_MONTH, BIRTH_DAY - 1, 17, 0, 0));
    }
    return { target, thresholdEnd, now };
}

function update() {
    const { target, thresholdEnd, now } = getDates();
    const diff = target - now;

    // We are currently in the birthday window
    if (now >= target && now <= thresholdEnd) {
        document.getElementById('phase-countdown').style.display = 'none';
        document.getElementById('phase-birthday').style.display = 'block';
        startConfetti();
    } else {
        document.getElementById('phase-birthday').style.display = 'none';
        document.getElementById('phase-countdown').style.display = 'block';
        
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        
        document.getElementById('cd-d').innerText = String(d).padStart(2,'0');
        document.getElementById('cd-h').innerText = String(h).padStart(2,'0');
        document.getElementById('cd-m').innerText = String(m).padStart(2,'0');
        document.getElementById('cd-s').innerText = String(s).padStart(2,'0');
    }
}

// ── Minimalist Purple Confetti ──
let confettiActive = false;
function startConfetti() {
    if(confettiActive) return;
    confettiActive = true;
    const cc = document.getElementById('confetti');
    cc.style.display = 'block';
    cc.width = innerWidth; cc.height = innerHeight;
    const cx = cc.getContext('2d');
    const drops = Array.from({length: 60}, () => ({
        x: Math.random()*cc.width, y: Math.random()*cc.height,
        v: Math.random()*2+1, color: Math.random() > 0.5 ? '#7c3aed' : '#e2e8f0',
        r: Math.random()*2+1
    }));
    function rain() {
        cx.clearRect(0,0,cc.width,cc.height);
        drops.forEach(d => {
            d.y += d.v;
            if(d.y > cc.height) d.y = -10;
            cx.beginPath();
            cx.arc(d.x, d.y, d.r, 0, Math.PI*2);
            cx.fillStyle = d.color;
            cx.globalAlpha = 0.4;
            cx.fill();
        });
        requestAnimationFrame(rain);
    }
    rain();
}

setInterval(update, 1000);
update();
</script>
</body>
</html>
